<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista</title>
    <link rel="icon" href="https://preview.redd.it/meu-gato-%C3%A9-praticamente-o-gato-do-meme-v0-n9dleoj8dgfc1.jpg?width=640&crop=smart&auto=webp&s=52de2578fe227e639db822d551bba33c6d28a2f1">
</head>
<body>
    <!--
    ul: lista não ordenada ol: lista ordenada hr: traço <ol type"1" reversed > auto explicativo
    -->
 <h1>Listas</h1>
<p>No HTML podemos criar 2 tipos de listas: Ordenadas e Não-Ordenadas</p>
<hr>
<h3>Não Ordenada</h3>
    <ul>
        <li>Carne</li>
        <li>Pão</li>
        <li>Leite</li>
    </ul>
 <h3>Ordenada</h3>
    <ol   type="1">
        <li>Cane</li>
        <li>Pão</li>
        <li>Leite</li>
    </ol>






</body>
</html>
